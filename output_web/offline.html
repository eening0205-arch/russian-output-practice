<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#23694b" />
    <title>俄语输出练习</title>
    <style>
      body {
        margin: 0;
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #f7f6f1;
        color: #1e2521;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 12px;
        width: min(420px, calc(100% - 32px));
        padding: 24px;
        border: 1px solid #d9dfd9;
        border-radius: 8px;
        background: #ffffff;
      }

      h1,
      p {
        margin: 0;
      }

      p {
        color: #68736d;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>离线模式</h1>
      <p>程序暂时没有网络。已经缓存的练习仍然可以打开，新的内容会在联网后更新。</p>
    </main>
  </body>
</html>
